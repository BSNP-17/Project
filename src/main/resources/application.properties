# Application properties (converted from properties format)

spring.data.mongodb.uri=mongodb://localhost:27017/travelease
spring.data.mongodb.auto-index-creation=true

# Temporary dev credentials (commented out). Use profiles or environment vars in production.
# spring.security.user.name=admin
# spring.security.user.password=admin

server.port=8081

# JWT configuration: prefer setting JWT_SECRET in the environment for production.
# Use a secret of at least 32 bytes for HMAC (do NOT commit secrets to VCS).
jwt.secret=${JWT_SECRET:change-me-please-use-env-var-that-is-32-bytes}
jwt.expiration=86400000

# Logging
logging.level.com.travelease=DEBUG
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/travelease-backend.log
